<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1a16"/>
      <stop offset="100%" stop-color="#100e0b"/>
    </linearGradient>
    <linearGradient id="bub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0B040"/>
      <stop offset="100%" stop-color="#C07818"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Chat bubble body -->
  <rect x="3" y="5" width="21" height="15" rx="4" fill="url(#bub)"/>

  <!-- Subtle top highlight -->
  <rect x="4" y="5.5" width="19" height="4" rx="2.5" fill="white" fill-opacity="0.12"/>

  <!-- Bubble tail -->
  <polygon points="6,20 5,27 13,20" fill="#B87018"/>

  <!-- Three typing dots -->
  <circle cx="8.5"  cy="12.5" r="2" fill="#1e1612"/>
  <circle cx="13.5" cy="12.5" r="2" fill="#1e1612"/>
  <circle cx="18.5" cy="12.5" r="2" fill="#1e1612"/>

  <!-- 4-point sparkle star (top-right) -->
  <path d="M27.5 3 L28.3 5.7 L31 6.5 L28.3 7.3 L27.5 10 L26.7 7.3 L24 6.5 L26.7 5.7 Z" fill="#FAD05A"/>
</svg>
