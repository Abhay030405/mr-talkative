services:
  backend:
    build:
      context: ./server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client
      args:
        # Point to the backend — on DO set BACKEND_URL to your backend's public URL
        NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
